<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Finance Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .tab-active { border-bottom: 3px solid #d97706; color: white; font-weight: 600; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-wallet text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold">Family Finance Manager</h1>
            </div>
            <div>
                <input type="password" id="login-password" value="family2026" 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 mb-4">
                <button onclick="login()" class="w-full bg-amber-600 hover:bg-amber-700 py-3 rounded-2xl font-semibold">Login</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden">
        <!-- Header -->
        <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-4">
            <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-amber-600 rounded-2xl flex items-center justify-center"><i class="fas fa-wallet text-white"></i></div>
                    <h1 class="text-2xl font-bold">Family Finance Manager</h1>
                </div>
                <button onclick="logout()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">Logout</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="max-w-screen-2xl mx-auto px-6 pt-6">
            <div class="flex border-b border-zinc-700">
                <button onclick="switchTab(0)" class="tab-btn tab-active px-6 py-3">Dashboard</button>
                <button onclick="switchTab(1)" class="tab-btn px-6 py-3">Admin Panel</button>
                <button onclick="switchTab(2)" class="tab-btn px-6 py-3">Bank Accounts</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="tab-0" class="tab-content max-w-screen-2xl mx-auto px-6 pt-8">
            <h2 class="text-2xl font-semibold mb-6">Dashboard</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                    <div class="text-sm text-zinc-400">Total Bank Balance</div>
                    <div class="text-4xl font-bold mt-2" id="dash-total-balance">₹0</div>
                </div>
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                    <div class="text-sm text-zinc-400">This FY Transactions</div>
                    <div class="text-4xl font-bold mt-2" id="dash-fy-txns">0</div>
                </div>
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                    <div class="text-sm text-zinc-400">Family Members</div>
                    <div class="text-4xl font-bold mt-2">4</div>
                </div>
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                    <div class="text-sm text-zinc-400">Bank Accounts</div>
                    <div class="text-4xl font-bold mt-2" id="dash-bank-count">0</div>
                </div>
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="tab-1" class="tab-content hidden max-w-screen-2xl mx-auto px-6 pt-8">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-semibold">Family Members</h2>
                <button onclick="showAddMemberModal()" class="px-5 py-2 bg-amber-600 rounded-2xl text-sm font-semibold">+ Add Member</button>
            </div>
            <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                <table class="w-full">
                    <thead><tr class="text-zinc-400 border-b border-zinc-700">
                        <th class="text-left py-3 px-4">Name</th>
                        <th class="text-left py-3 px-4">Relation</th>
                        <th class="text-left py-3 px-4">DOB</th>
                        <th></th>
                    </tr></thead>
                    <tbody id="family-table"></tbody>
                </table>
            </div>
        </div>

        <!-- BANK ACCOUNTS -->
        <div id="tab-2" class="tab-content hidden max-w-screen-2xl mx-auto px-6 pt-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold">Bank Accounts</h2>
                <div>
                    <button onclick="showAddBankAccountModal()" class="px-5 py-2.5 bg-zinc-700 rounded-2xl text-sm font-semibold mr-2">+ Add Account</button>
                    <button onclick="loadHDFCDataFromFile()" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm font-semibold">
                        <i class="fas fa-download mr-2"></i> Load HDFC Data (from file)
                    </button>
                </div>
            </div>

            <!-- Summary -->
            <div class="grid grid-cols-3 gap-6 mb-6">
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                    <div class="text-sm text-zinc-400">Total Transactions</div>
                    <div class="text-4xl font-bold" id="bank-total-txns">0</div>
                </div>
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                    <div class="text-sm text-zinc-400">Total Withdrawals</div>
                    <div class="text-4xl font-bold text-red-400" id="bank-total-withdrawal">₹0</div>
                </div>
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                    <div class="text-sm text-zinc-400">Total Deposits</div>
                    <div class="text-4xl font-bold text-green-400" id="bank-total-deposit">₹0</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-4 mb-6 flex gap-4">
                <select id="filter-person" onchange="filterTransactions()" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2 text-sm"></select>
                <select id="filter-fy" onchange="filterTransactions()" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2 text-sm"></select>
                <input type="text" id="filter-search" onkeyup="filterTransactions()" placeholder="Search narration..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2 text-sm">
            </div>

            <!-- Transactions Table -->
            <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                <div class="overflow-auto max-h-[550px]">
                    <table class="w-full text-sm">
                        <thead class="sticky top-0 bg-zinc-900">
                            <tr class="border-b border-zinc-700 text-zinc-400">
                                <th class="text-left py-3 px-4">Date</th>
                                <th class="text-left py-3 px-4">Person</th>
                                <th class="text-left py-3 px-4">Bank</th>
                                <th class="text-left py-3 px-4">Narration</th>
                                <th class="text-right py-3 px-4">Withdrawal</th>
                                <th class="text-right py-3 px-4">Deposit</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-table" class="divide-y divide-zinc-800"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let familyMembers = [];
        let bankAccounts = [];
        let allTransactions = [];

        function login() {
            if (document.getElementById('login-password').value === "family2026") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initData();
            } else {
                alert("Wrong password");
            }
        }

        function logout() {
            location.reload();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn')[tab].classList.add('tab-active');

            if (tab === 2) renderBankUI();
        }

        function initData() {
            // Load family members
            const saved = localStorage.getItem('familyMembers');
            if (saved) {
                familyMembers = JSON.parse(saved);
            } else {
                familyMembers = [
                    { id: "muralidhar", name: "Bailur Muralidhar Kini", dob: "1978-04-14", relation: "Self" },
                    { id: "leena", name: "Leena Kini", dob: "1978-05-07", relation: "Wife" },
                    { id: "niyati", name: "Niyati Kini", dob: "2009-09-24", relation: "Daughter" },
                    { id: "jayanth", name: "Jayanth Kini", dob: "2013-09-20", relation: "Son" }
                ];
                localStorage.setItem('familyMembers', JSON.stringify(familyMembers));
            }

            // Load saved data
            const savedBanks = localStorage.getItem('bankAccounts');
            if (savedBanks) bankAccounts = JSON.parse(savedBanks);

            const savedTxns = localStorage.getItem('allTransactions');
            if (savedTxns) allTransactions = JSON.parse(savedTxns);

            renderFamilyTable();
            updateDashboard();
        }

        function saveData() {
            localStorage.setItem('familyMembers', JSON.stringify(familyMembers));
            localStorage.setItem('bankAccounts', JSON.stringify(bankAccounts));
            localStorage.setItem('allTransactions', JSON.stringify(allTransactions));
        }

        // ==================== BANK ACCOUNTS ====================
        function renderBankUI() {
            // Populate filters
            const personSel = document.getElementById('filter-person');
            personSel.innerHTML = '<option value="">All Persons</option>';
            familyMembers.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id; opt.textContent = m.name;
                personSel.appendChild(opt);
            });

            filterTransactions();
            updateBankSummary();
        }

        function updateBankSummary() {
            document.getElementById('bank-total-txns').textContent = allTransactions.length;
            let w = 0, d = 0;
            allTransactions.forEach(t => {
                w += parseFloat(t.withdrawal) || 0;
                d += parseFloat(t.deposit) || 0;
            });
            document.getElementById('bank-total-withdrawal').textContent = '₹' + w.toLocaleString('en-IN');
            document.getElementById('bank-total-deposit').textContent = '₹' + d.toLocaleString('en-IN');
            document.getElementById('dash-bank-count').textContent = bankAccounts.length;
        }

        function filterTransactions() {
            const person = document.getElementById('filter-person').value;
            const search = document.getElementById('filter-search').value.toLowerCase();
            const tbody = document.getElementById('transactions-table');
            tbody.innerHTML = '';

            let filtered = allTransactions;

            if (person) filtered = filtered.filter(t => t.personId === person);
            if (search) filtered = filtered.filter(t => t.narration?.toLowerCase().includes(search));

            filtered.forEach(t => {
                const personObj = familyMembers.find(p => p.id === t.personId);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="py-3 px-4">${t.date}</td>
                    <td class="py-3 px-4">${personObj ? personObj.name : ''}</td>
                    <td class="py-3 px-4">${t.bankName}</td>
                    <td class="py-3 px-4 text-xs max-w-xs truncate">${t.narration}</td>
                    <td class="py-3 px-4 text-right text-red-400">${t.withdrawal ? '₹' + parseFloat(t.withdrawal).toLocaleString('en-IN') : ''}</td>
                    <td class="py-3 px-4 text-right text-green-400">${t.deposit ? '₹' + parseFloat(t.deposit).toLocaleString('en-IN') : ''}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Load your HDFC JSON directly from file
        async function loadHDFCDataFromFile() {
            if (!confirm("This will load your HDFC_4684.json from the 'bank/muralidhar/' folder. Continue?")) return;

            try {
                const response = await fetch('./bank/muralidhar/HDFC_4684.json');
                if (!response.ok) {
                    alert("File not found. Make sure HDFC_4684.json is inside bank/muralidhar/ folder.");
                    return;
                }
                const data = await response.json();

                // Find or create HDFC account for Muralidhar
                let hdfcAccount = bankAccounts.find(a => a.personId === "muralidhar" && a.bankName === "HDFC");
                
                if (!hdfcAccount) {
                    hdfcAccount = {
                        id: Date.now().toString(),
                        personId: "muralidhar",
                        bankName: "HDFC",
                        accountNumber: "4684"
                    };
                    bankAccounts.push(hdfcAccount);
                }

                // Clear old transactions for this account
                allTransactions = allTransactions.filter(t => t.bankAccountId !== hdfcAccount.id);

                let count = 0;
                data.forEach(item => {
                    const date = item.Date || item.date;
                    if (!date) return;

                    allTransactions.push({
                        id: Date.now().toString(36) + Math.random(),
                        personId: "muralidhar",
                        bankAccountId: hdfcAccount.id,
                        bankName: "HDFC",
                        date: date,
                        narration: item.Narration || "",
                        withdrawal: parseFloat(String(item["Withdrawal Amount"] || 0).replace(/,/g, '')) || 0,
                        deposit: parseFloat(String(item["Deposit Amount"] || 0).replace(/,/g, '')) || 0,
                        balance: parseFloat(String(item["Closing Balance*"] || 0).replace(/,/g, '')) || 0
                    });
                    count++;
                });

                saveData();
                alert(`${count} transactions loaded successfully from HDFC_4684.json`);
                renderBankUI();
                updateDashboard();

            } catch (error) {
                alert("Error loading file: " + error.message);
            }
        }

        function showAddBankAccountModal() {
            alert("Add Bank Account feature will be improved in next update. For now, use the 'Load HDFC Data' button.");
        }

        function renderFamilyTable() {
            const tbody = document.getElementById('family-table');
            tbody.innerHTML = '';
            familyMembers.forEach((m, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="py-3 px-4">${m.name}</td>
                    <td class="py-3 px-4">${m.relation}</td>
                    <td class="py-3 px-4">${m.dob}</td>
                    <td class="py-3 px-4"><button onclick="deleteFamilyMember(${i})" class="text-red-400"><i class="fas fa-trash"></i></button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function deleteFamilyMember(i) {
            if (confirm("Delete member?")) {
                familyMembers.splice(i, 1);
                saveData();
                renderFamilyTable();
            }
        }

        function showAddMemberModal() {
            const name = prompt("Full Name:");
            if (!name) return;
            const relation = prompt("Relation:", "Son");
            const dob = prompt("Date of Birth (YYYY-MM-DD):", "2015-01-01");
            familyMembers.push({ id: Date.now().toString(), name, dob, relation });
            saveData();
            renderFamilyTable();
        }

        function updateDashboard() {
            // Can be expanded later
        }

        function initApp() {
            // Auto init
        }

        window.onload = initApp;
    </script>
</body>
</html>
